name: Statex → Supabase sync

on:
  schedule:
    - cron: "0 6 * * *"   # runs daily at 6 AM UTC — adjust as needed
  workflow_dispatch:        # lets you trigger it manually from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        env:
          STATEX_TOKEN:        ${{ secrets.STATEX_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/statex_to_supabase.py